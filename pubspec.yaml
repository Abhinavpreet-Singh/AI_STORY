name: ai_story_buddy
description: AI Story Buddy - immersive storytelling with interactive quiz for children.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_dotenv: ^5.2.1
  flutter_tts: ^4.2.0
  http: ^1.2.2
  audioplayers: ^6.1.0
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/quiz.json
    - .env
